name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check Out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build Release Artifacts
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          PREFIX="information-${VERSION}"
          git archive --format=zip --output "dist/${PREFIX}.zip" --prefix "${PREFIX}/" HEAD
          git archive --format=tar.gz --output "dist/${PREFIX}.tar.gz" --prefix "${PREFIX}/" HEAD
          (
            cd dist
            sha256sum "${PREFIX}.zip" "${PREFIX}.tar.gz" > "${PREFIX}-SHA256SUMS.txt"
          )

      - name: Publish GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/* --clobber
          else
            gh release create "${VERSION}" dist/* --title "${VERSION}" --generate-notes
          fi
